version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: trademate-postgres
    environment:
      POSTGRES_DB: trademate
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trademate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trademate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trademate-redis
    ports:
      - "6379:6379"
    networks:
      - trademate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  trademate-network:
    driver: bridge

volumes:
  postgres_data:
